services:
  # ── Backend API ──────────────────────────────────────────────────────────
  - type: web
    name: lexad-api
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt && cd backend && alembic upgrade head && python -m app.db.seed
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: APP_ENV
        value: production
      - key: DATABASE_MODE
        value: neon
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_POOL_SIZE
        value: "2"
      - key: DATABASE_MAX_OVERFLOW
        value: "3"
      - key: SECRET_KEY
        generateValue: true
      - key: COMPETITION_MODE
        value: "true"
      - key: DEMO_SEED_ENABLED
        value: "true"
      - key: DEMO_ADMIN_PASSWORD
        sync: false
      - key: DEMO_MARKETING_PASSWORD
        sync: false
      - key: DEMO_LEGAL_PASSWORD
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false

  # ── Frontend Static Site ─────────────────────────────────────────────────
  - type: web
    name: lexad-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: "/*"
        destination: /index.html
    headers:
      - path: "/*"
        name: X-Content-Type-Options
        value: nosniff
      - path: "/*"
        name: X-Frame-Options
        value: DENY
      - path: "/*"
        name: Referrer-Policy
        value: no-referrer
      - path: "/*"
        name: Permissions-Policy
        value: "camera=(), microphone=(), geolocation=()"
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
